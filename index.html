<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lonchera Saludable</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;

            background: linear-gradient(-45deg, #4f46e5, #06b6d4, #38bdf8, #9333ea);
            background-size: 400% 400%;
            animation: fondo 12s ease infinite;

        }

        @keyframes fondo {

            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }

        }

        .contenedor {

            width: 1100px;
            max-width: 100%;

            background: rgba(255, 255, 255, .18);

            backdrop-filter: blur(12px);

            border-radius: 20px;

            padding: 30px;

            box-shadow: 0 25px 50px rgba(0, 0, 0, .35);

            animation: entrada 1s;

        }

        @keyframes entrada {

            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        h1 {

            text-align: center;
            font-size: 45px;
            color: white;
            margin-bottom: 10px;

        }

        .subtitulo {

            text-align: center;
            color: white;
            margin-bottom: 35px;

        }

        .principal {

            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;

        }

        .formulario {

            background: white;

            padding: 25px;

            border-radius: 18px;

            box-shadow: 0 20px 40px rgba(0, 0, 0, .18);

        }

        label {

            display: block;

            margin-top: 18px;

            font-weight: bold;

            color: #444;

        }

        select {

            width: 100%;

            padding: 12px;

            margin-top: 8px;

            border-radius: 10px;

            border: 2px solid #ddd;

            font-size: 15px;

            transition: .3s;

        }

        select:hover {

            border-color: #06b6d4;

        }

        select:focus {

            outline: none;

            border-color: #4f46e5;

            box-shadow: 0 0 12px rgba(79, 70, 229, .35);

        }

        button {

            margin-top: 25px;

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 12px;

            background: linear-gradient(45deg, #4f46e5, #06b6d4);

            color: white;

            font-size: 18px;

            cursor: pointer;

            transition: .35s;

            box-shadow: 0 10px 25px rgba(0, 0, 0, .25);

        }

        button:hover {

            transform: translateY(-5px);

            box-shadow: 0 20px 35px rgba(0, 0, 0, .35);

        }

        .panel {

            display: grid;

            grid-template-columns: repeat(2, 1fr);

            gap: 18px;

        }

        .card {

            padding: 25px;

            border-radius: 18px;

            color: white;

            box-shadow: 0 15px 30px rgba(0, 0, 0, .20);

            transition: .35s;

            animation: entrada .8s;

        }

        .card:hover {

            transform: translateY(-8px) scale(1.03);

            box-shadow: 0 25px 45px rgba(0, 0, 0, .35);

        }

        .card h3 {

            margin-bottom: 12px;

        }

        .card p {

            font-size: 18px;

            font-weight: bold;

        }

        .verduras {

            background: #22c55e;

        }

        .proteina {

            background: #ef4444;

        }

        .carbohidrato {

            background: #f59e0b;

        }

        .fruta {

            background: #ec4899;

        }

        .bebida {

            background: #0ea5e9;

            grid-column: 1/3;

        }

        .descripcion {

            margin-top: 30px;

            background: white;

            padding: 25px;

            border-radius: 18px;

            box-shadow: 0 15px 35px rgba(0, 0, 0, .2);

            animation: entrada 1.2s;

        }

        .descripcion h2 {

            margin-bottom: 10px;

            color: #4f46e5;

        }

        @media(max-width:900px) {

            .principal {

                grid-template-columns: 1fr;

            }

            .panel {

                grid-template-columns: 1fr;

            }

            .bebida {

                grid-column: auto;

            }

        }
    </style>

</head>

<body>

    <div class="contenedor">

        <h1>🥗 Mi Lonchera Saludable</h1>

        <p class="subtitulo">
            Construye una comida equilibrada seleccionando alimentos saludables.
        </p>

        <div class="principal">

            <div class="formulario">

                <label>🥦 Verduras</label>

                <select id="verduras">
                    <option>Ensalada de lechuga, tomate y zanahoria</option>
                    <option>Brócoli con zanahoria</option>
                    <option>Espinaca, pepino y tomate</option>
                    <option>Repollo, remolacha y habichuela</option>
                </select>

                <label>🍗 Proteína</label>

                <select id="proteina">
                    <option>Pechuga de pollo</option>
                    <option>Huevo cocido</option>
                    <option>Pescado al horno</option>
                    <option>Lentejas</option>
                </select>

                <label>🍚 Carbohidrato</label>

                <select id="carbohidrato">
                    <option>Arroz integral</option>
                    <option>Papa cocida</option>
                    <option>Yuca</option>
                    <option>Pan integral</option>
                </select>

                <label>🍎 Fruta</label>

                <select id="fruta">
                    <option>Manzana</option>
                    <option>Papaya</option>
                    <option>Naranja</option>
                    <option>Aguacate</option>
                </select>

                <label>🥤 Bebida</label>

                <select id="bebida">
                    <option>Agua</option>
                    <option>Jugo natural</option>
                    <option>Agua con limón</option>
                </select>

                <button id="crearPlato">
                    Crear Plato Saludable
                </button>

            </div>

            <div class="panel">

                <div class="card verduras">
                    <h3>🥦 Verduras</h3>
                    <p id="textoVerduras"></p>
                </div>

                <div class="card proteina">
                    <h3>🍗 Proteína</h3>
                    <p id="textoProteina"></p>
                </div>

                <div class="card carbohidrato">
                    <h3>🍚 Carbohidrato</h3>
                    <p id="textoCarbohidrato"></p>
                </div>

                <div class="card fruta">
                    <h3>🍎 Fruta</h3>
                    <p id="textoFruta"></p>
                </div>

                <div class="card bebida">
                    <h3>🥤 Bebida</h3>
                    <p id="textoBebida"></p>
                </div>

            </div>

        </div>

        <div class="descripcion">

            <h2>Descripción del Plato</h2>

            <p id="descripcion"></p>

        </div>

    </div>

    <script>

        const verduras = document.getElementById("verduras");
        const proteina = document.getElementById("proteina");
        const carbohidrato = document.getElementById("carbohidrato");
        const fruta = document.getElementById("fruta");
        const bebida = document.getElementById("bebida");

        const textoVerduras = document.getElementById("textoVerduras");
        const textoProteina = document.getElementById("textoProteina");
        const textoCarbohidrato = document.getElementById("textoCarbohidrato");
        const textoFruta = document.getElementById("textoFruta");
        const textoBebida = document.getElementById("textoBebida");

        const descripcion = document.getElementById("descripcion");

        function crearPlato() {

            textoVerduras.textContent = verduras.value;
            textoProteina.textContent = proteina.value;
            textoCarbohidrato.textContent = carbohidrato.value;
            textoFruta.textContent = fruta.value;
            textoBebida.textContent = bebida.value;

            descripcion.innerHTML =

                "<b>Tu plato saludable incluye:</b><br><br>" +

                verduras.value + ", " +
                proteina.value + ", " +
                carbohidrato.value + ", " +
                fruta.value + " y " +
                bebida.value +

                ". Esta combinación aporta proteínas, vitaminas, minerales, carbohidratos saludables e hidratación para una alimentación equilibrada.";

            descripcion.animate([
                { transform: "scale(.95)", opacity: .5 },
                { transform: "scale(1)", opacity: 1 }
            ], {
                duration: 500
            });

        }

        document.getElementById("crearPlato").addEventListener("click", crearPlato);

        crearPlato();

    </script>

</body>

</html>
